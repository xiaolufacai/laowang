{include file="/layout/header" /}

<!-- wangEditor v4 -->
<script src="/static/admin/js/wangEditor.min.js"></script>

<div id="app" style="background-color: #ffffff">
	<el-container>
		<el-header style="text-align: right; font-size: 12px">
			<el-button type="primary" @click="openFormModal('add')">新增应用</el-button>
		</el-header>

		<el-main>
			<el-table :data="apps" border style="width: 100%">
				<el-table-column align="center" prop="id" label="ID" width="80"></el-table-column>
				<el-table-column align="center" prop="app_id" label="APP ID" min-width="180"></el-table-column>
				<el-table-column align="center" prop="name" label="包名" min-width="150"></el-table-column>
				<el-table-column align="center" prop="project" label="项目名" min-width="150"></el-table-column>
				<el-table-column align="center" prop="ad_id" label="广告ID" min-width="180"></el-table-column>
				<el-table-column align="center" prop="ym_id" label="友盟ID" min-width="150"></el-table-column>
				<el-table-column align="center" prop="src_id" label="SRC ID" min-width="150"></el-table-column>
				<el-table-column align="center" label="操作" width="340" fixed="right">
					<template slot-scope="scope">
						<el-button size="mini" type="success" @click="editApp(scope.row)">编辑</el-button>
						<el-button size="mini" @click="openDetailModal(scope.row)">详情</el-button>
						<el-button size="mini" type="primary" @click="openNotifyModal(scope.row)">通知地址</el-button>
						<el-button size="mini" type="danger" @click="deleteApp(scope.row)">删除</el-button>
					</template>
				</el-table-column>
			</el-table>
		</el-main>

		<!-- Form Modal -->
		<el-dialog :visible.sync="formVisible" :title="formTitle" width="60%">
			<el-form :model="ruleForm" ref="ruleForm" :rules="rules" label-width="120px">
				<el-form-item label="项目名" prop="project">
					<el-input v-model="ruleForm.project" placeholder="请输入项目名"></el-input>
				</el-form-item>

				<el-form-item label="包名称" prop="name">
					<el-input v-model="ruleForm.name" placeholder="请输入包名称"></el-input>
				</el-form-item>

				<el-form-item label="仓库地址" prop="repository">
					<el-input v-model="ruleForm.repository" placeholder="请输入仓库地址"></el-input>
				</el-form-item>

				<el-form-item label="广告ID" prop="ad_id">
					<el-input v-model="ruleForm.ad_id" type="textarea" rows="4" placeholder="请输入广告ID"></el-input>
				</el-form-item>

				<el-form-item label="友盟ID" prop="ym_id">
					<el-input v-model="ruleForm.ym_id" placeholder="请输入友盟ID"></el-input>
				</el-form-item>

				<el-form-item label="SRC ID" prop="src_id">
					<el-input v-model="ruleForm.src_id" placeholder="请输入SRC ID"></el-input>
				</el-form-item>

				<!-- 富文本 -->
				<el-form-item label="APP 描述" prop="description">
					<div id="editor" style="border:1px solid #dcdfe6; border-radius:4px;"></div>
				</el-form-item>

				<el-form-item>
					<el-button @click="formVisible = false">取消</el-button>
					<el-button type="primary" @click="submitForm('ruleForm')">提交</el-button>
				</el-form-item>
			</el-form>
		</el-dialog>

		<el-dialog :visible.sync="detailVisible" :title="detailTitle" width="70%">
			<el-table :data="detailRows" border>
				<el-table-column align="center" prop="label" label="字段" width="180"></el-table-column>
				<el-table-column prop="value" label="内容">
					<template slot-scope="scope">
						<div v-if="scope.row.key === 'description'" class="detail-value" v-html="scope.row.value || '-'"></div>
						<div v-else class="detail-value">{{ scope.row.value || '-' }}</div>
					</template>
				</el-table-column>
			</el-table>
			<span slot="footer" class="dialog-footer">
				<el-button type="primary" @click="detailVisible = false">关闭</el-button>
			</span>
		</el-dialog>

		<el-dialog :visible.sync="notifyVisible" :title="notifyTitle" width="70%" class="notify-dialog">
			<div v-for="item in notifyAddresses" :key="item.key" class="notify-item">
				<div class="notify-label">{{ item.label }}</div>
				<div class="notify-row">
					<el-input :value="item.url" readonly></el-input>
					<el-button type="primary" @click="copyNotifyUrl(item.url)">复制</el-button>
				</div>
			</div>
			<span slot="footer" class="dialog-footer">
				<el-button type="primary" @click="notifyVisible = false">关闭</el-button>
			</span>
		</el-dialog>
	</el-container>
</div>

<style>
	.el-header { background-color: #e7ebf0; color: #333; line-height: 60px; }
	.notify-item { margin-bottom: 14px; }
	.notify-label { margin-bottom: 6px; color: #000; font-size: 18px; font-weight: bold; line-height: 1.3; }
	.notify-row { display: flex; gap: 10px; align-items: center; }
	.notify-row .el-input { flex: 1; }
	.notify-dialog .el-dialog__body { min-height: 420px; }
	.detail-value { word-break: break-all; }
</style>

<script type="module">
	const initForm = {
		project: '',
		name: '',
		repository: '',
		ad_id: '',
		ym_id: '',
		src_id: '',
		description: ''
	}
	const _initForm = Object.assign({}, initForm);
	Object.freeze(_initForm);
	const detailFields = [
		{ key: 'project', label: '项目名' },
		{ key: 'name', label: '包名称' },
		{ key: 'repository', label: '仓库地址' },
		{ key: 'ad_id', label: '广告ID' },
		{ key: 'ym_id', label: '友盟ID' },
		{ key: 'src_id', label: 'SRC ID' },
		{ key: 'description', label: 'APP 描述' },
		{ key: 'create_time', label: '新增时间' },
		{ key: 'update_time', label: '更新时间' }
	];
	const notifyPlatforms = [
		{ key: 'vivo', label: 'VIVO', path: 'vivo' },
		{ key: 'oppo', label: 'OPPO', path: 'oppo' },
		{ key: 'xiaomi', label: '小米', path: 'xiaomi' },
		{ key: 'honor', label: '荣耀', path: 'rongyao' },
		{ key: 'huawei', label: '华为', path: 'huawei' }
	];

	var Main = {
		data() {
			return {
				ruleForm: { ...initForm },
				rules: {
					project: [{ required: true, message: '请输入项目名', trigger: 'change' }],
					name: [{ required: true, message: '请输入包名称', trigger: 'change' }],
					repository: [{ required: false, message: '请输入仓库地址', trigger: 'change' }],
					ad_id: [{ required: false, message: '请输入广告ID', trigger: 'change' }],
					ym_id: [{ required: false, message: '请输入友盟ID', trigger: 'change' }],
					src_id: [{ required: false, message: '请输入SRC ID', trigger: 'change' }],
					description: [{ required: false, message: '请输入APP描述', trigger: 'blur' }]
				},

				editor: null,
				formVisible: false,
				editMode: 'add',  // add / edit
				apps: [],
				detailVisible: false,
				detailApp: {},
				notifyVisible: false,
				notifyApp: {},
			}
		},

		created() {
			this.getApps();
		},

		methods: {
			/** ---------------- 新增 or 编辑 打开表单 ---------------- */
			openFormModal(mode = 'add') {
				this.editMode = mode;
				if (mode === 'add') {
					this.ruleForm = { ..._initForm };
				}

				this.formVisible = true;

				this.$nextTick(() => {
					if (this.editor) {
						this.editor.destroy();
						this.editor = null;
					}

					const E = window.wangEditor;
					this.editor = new E('#editor');
					this.editor.config.onchange = html => {
						this.ruleForm.description = html;
					}
					this.editor.create();

					if (mode === 'edit') {
						this.editor.txt.html(this.ruleForm.description);
					}
				})
			},

			/** ---------------- 提交表单（新增 / 编辑） ---------------- */
			submitForm(formName) {
				this.ruleForm.description = this.editor.txt.html();
				this.$refs[formName].validate(valid => {
					if (!valid) {
						return this.$message.error('表单验证失败，请检查内容');
					}

					let url = this.editMode === 'add'
							? '/admin/app/add'
							: '/admin/app/update';

					axios.post(url, this.ruleForm)
							.then(res => {
								if (res.data.code === 0) {
									this.$message.success(this.editMode === 'add' ? '新增成功!' : '修改成功!');

									this.formVisible = false;
									this.editor && this.editor.destroy();
									this.ruleForm = { ..._initForm };
									this.$refs[formName].resetFields();

									this.getApps();
								} else {
									this.$message.error(res.data.msg || '操作失败');
								}
							})
				});
			},

			/** ---------------- 读取 APP 列表 ---------------- */
			getApps() {
				axios.get('/admin/app/apps')
						.then(res => {
							const data = res.data.data;
							const code = res.data.code;

							if (code !== 0) {
								this.apps = [];
								return;
							}

							this.apps = data;
						});
			},

			/** ---------------- 获取某 APP（编辑用） ---------------- */
			getAppData(id) {
				return axios.get('/admin/app/app', { params: { id } })
						.then(res => {
							if (res.data.code !== 0) {
								this.$message.error('获取 APP 失败');
								return null;
							}
							return res.data.data;
						});
			},

			/** ---------------- 删除 ---------------- */
			deleteApp(row) {
				this.$confirm('确定删除该应用吗？', '提示', {
					confirmButtonText: '确定',
					cancelButtonText: '取消',
					type: 'warning'
				}).then(() => {
					axios.post('/admin/app/delete', { id: row.id })
							.then(res => {
								if (res.data.code === 0) {
									this.$message.success('删除成功!');
									this.getApps();
								} else {
									this.$message.error('删除失败!');
								}
							})
				}).catch(() => {});
			},

			/** ---------------- 编辑 ---------------- */
			editApp(row) {
				this.getAppData(row.id).then(data => {
					if (!data) return;

					// 填充表单
					this.ruleForm = {
						id: data.id,
						project: data.project,
						name: data.name,
						repository: data.repository,
						ad_id: data.ad_id,
						ym_id: data.ym_id,
						src_id: data.src_id,
						description: data.description
					};

					// 打开编辑弹窗
					this.openFormModal('edit');
				});
			},

			openDetailModal(row) {
				this.getAppData(row.id).then(data => {
					if (!data) return;

					this.detailApp = data;
					this.detailVisible = true;
				});
			},

			openNotifyModal(row) {
				this.notifyApp = row;
				this.notifyVisible = true;
			},

			copyNotifyUrl(url) {
				const input = document.createElement('input');
				input.value = url;
				document.body.appendChild(input);
				input.select();
				document.execCommand('copy');
				document.body.removeChild(input);
				this.$message.success('复制成功');
			}
		},

		computed: {
			formTitle() {
				return this.editMode === 'add' ? '新增应用' : '编辑应用';
			},
			notifyTitle() {
				const project = this.notifyApp.project || '';
				return project ? project + ' - 通知地址' : '通知地址';
			},
			detailTitle() {
				const project = this.detailApp.project || '';
				return project ? project + ' - 详情' : '应用详情';
			},
			detailRows() {
				return detailFields.map(item => {
					let value = this.detailApp[item.key];

					return {
						key: item.key,
						label: item.label,
						value: value
					};
				});
			},
			notifyAddresses() {
				const appId = this.notifyApp.app_id || '';
				return notifyPlatforms.map(item => ({
					key: item.key,
					label: item.label,
					url: 'https://api.yichunchihang.com/notify/' + item.path + '.html?appId=' + appId
				}));
			}
		}
	};

	var Ctor = Vue.extend(Main)
	new Ctor().$mount('#app')
</script>


{include file="/layout/footer" /}
